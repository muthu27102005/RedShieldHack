{% extends "base.html" %}

{% block page_title %}Active FIR Logging{% endblock %}
{% block page_subtitle %}Directly feed single incident reports into the OMNI-CORTEX ML model.{% endblock %}

{% block content %}
<div class="panel" style="max-width: 800px; margin: 0 auto; padding: 40px;">
    <h3 style="margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; color: var(--primary);">
        <i class="fa-solid fa-file-pen"></i> New First Information Report (FIR)
    </h3>

    <form action="{{ url_for('log_fir') }}" method="POST">
        <div class="form-group" style="margin-bottom: 20px;">
            <label>Incident Location (Address / Street Name)</label>
            <input type="text" name="address" class="form-control" placeholder="e.g. Marina Beach, Chennai or Anna Nagar, Chennai" required>
        </div>

        <div class="form-group">
            <label>Primary Crime Type</label>
            <select name="crime_type" class="form-control" required>
                <option value="Theft">Theft</option>
                <option value="Assault">Assault</option>
                <option value="Burglary">Burglary</option>
                <option value="Vandalism">Vandalism</option>
                <option value="Narcotics">Narcotics</option>
                <option value="Robbery">Robbery</option>
            </select>
        </div>

        <div class="grid-2-layout" style="gap: 20px; grid-template-columns: 1fr 1fr; margin-bottom: 30px;">
             <div class="form-group">
                <label>Meteorological Context</label>
                <select name="weather_condition" class="form-control">
                    <option value="Clear">Clear</option>
                    <option value="Rain">Rain</option>
                    <option value="Fog">Fog</option>
                    <option value="Extreme Heat">Extreme Heat</option>
                </select>
            </div>
            <div class="form-group">
                <label>Incident Severity Index (1-10)</label>
                <input type="number" name="severity_index" min="1" max="10" class="form-control" value="5" required>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 15px;">
            <i class="fa-solid fa-satellite-dish"></i> Upload FIR to Cortex
        </button>
    </form>
</div>
{% endblock %}
